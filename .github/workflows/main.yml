name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            name: Windows
          - os: macos-latest  
            platform: mac
            name: macOS
          - os: ubuntu-latest
            platform: android
            name: Android
    
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Geode CLI
      uses: geode-sdk/cli@v1

    - name: Install Geode SDK
      run: geode sdk install && geode sdk install-binaries

    - name: Setup Android NDK
      if: matrix.platform == 'android'
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Build mod
      run: geode build --platform ${{ matrix.platform }} --config Release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}-${{ matrix.platform }}
        path: build/*.geode
